services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:?Set DB_NAME in .env}
      MYSQL_USER: ${DB_USER:?Set DB_USER in .env}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--protocol=tcp", "-h", "127.0.0.1", "--silent"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:7.0-php8.3-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WP_PORT:-80}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME:?Set DB_NAME in .env}
      WORDPRESS_DB_USER: ${DB_USER:?Set DB_USER in .env}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
        define( 'DISALLOW_FILE_EDIT', true );
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/starter:/var/www/html/wp-content/themes/starter:ro
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$socket = @fsockopen(\"127.0.0.1\", 80); exit($$socket ? 0 : 1);'"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5.2
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: db

  wpcli:
    image: wordpress:cli-php8.3
    profiles: [tools]
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME:?Set DB_NAME in .env}
      WORDPRESS_DB_USER: ${DB_USER:?Set DB_USER in .env}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      WP_URL: ${WP_URL:?Set WP_URL in .env}
      WP_TITLE: ${WP_TITLE:?Set WP_TITLE in .env}
      WP_ADMIN_USER: ${WP_ADMIN_USER:?Set WP_ADMIN_USER in .env}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD:?Set WP_ADMIN_PASSWORD in .env}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL:?Set WP_ADMIN_EMAIL in .env}
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/starter:/var/www/html/wp-content/themes/starter:ro
    entrypoint: ["wp"]

volumes:
  db_data:
  wp_data:
